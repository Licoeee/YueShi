<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>详情页底栏目标稿 V3</title>
    <style>
      :root {
        --bg: #f8e2d8;
        --card: #f8f7f7;
        --ink: #3f2723;
        --muted: #7d5b53;
        --line: rgba(195, 127, 109, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 10%, #ffece4, #f4cdbf 72%);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        color: var(--ink);
      }

      .phone {
        width: 390px;
        height: 844px;
        border-radius: 34px;
        border: 6px solid #3b2626;
        background: var(--bg);
        position: relative;
        overflow: hidden;
        box-shadow: 0 24px 54px rgba(70, 30, 24, 0.28);
      }

      .status-bar {
        height: 48px;
        padding: 12px 22px 0;
        display: flex;
        justify-content: space-between;
        font-size: 16px;
        color: #4a3230;
      }

      .island {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 128px;
        height: 24px;
        border-radius: 999px;
        background: #3c2424;
      }

      .content {
        height: calc(100% - 48px);
        padding: 18px 14px 156px;
      }

      .hero {
        height: 252px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: radial-gradient(circle at 48% 18%, #fffaf7 0%, #ffe5d8 62%, #ffc9b7 100%);
      }

      .section {
        margin-top: 14px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(192, 126, 108, 0.18);
        background: rgba(255, 255, 255, 0.88);
      }

      .section strong {
        display: block;
        font-size: 30px;
        line-height: 1.2;
      }

      .section p {
        margin: 8px 0 0;
        font-size: 26px;
        line-height: 1.4;
        color: var(--muted);
      }

      .detail-bar {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 4;
        display: grid;
        grid-template-columns: 136px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 251, 248, 0.97);
        box-shadow: 0 12px 26px rgba(163, 98, 84, 0.2);
      }

      .detail-bar__nav,
      .detail-bar__actions {
        min-width: 0;
        display: grid;
        gap: 8px;
      }

      .detail-bar__nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-bar__actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mini-btn {
        min-height: 64px;
        border-radius: 14px;
        border: 1px solid rgba(185, 119, 103, 0.24);
        background: #fffdfc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        color: #7a5951;
        font-size: 11px;
        font-weight: 600;
      }

      .mini-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      .act-btn {
        min-height: 64px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 15px;
        font-weight: 700;
        white-space: nowrap;
      }

      .act-btn--ghost {
        border: 1px solid rgba(189, 122, 106, 0.24);
        background: #fff5ef;
        color: #bf5e46;
      }

      .act-btn--primary {
        border: 1px solid transparent;
        background: linear-gradient(135deg, #f37a57 0%, #f8a26e 100%);
        color: #fffdfa;
      }

      .home-indicator {
        position: absolute;
        left: 50%;
        bottom: 4px;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        border-radius: 999px;
        background: #2e2a2b;
        opacity: 0.55;
      }

      .note {
        position: fixed;
        top: 16px;
        left: 16px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(38, 25, 24, 0.82);
        color: #fff4f0;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="note">目标稿：390 × 844（对齐现有页面预览尺寸）</div>
    <section class="phone">
      <div class="island"></div>
      <div class="status-bar">
        <span>17:03</span>
        <span>5G · 94%</span>
      </div>

      <main class="content">
        <div class="hero"></div>
        <section class="section">
          <strong>层数</strong>
          <p>单层 / 双层 / 三层</p>
        </section>
        <section class="section">
          <strong>尺寸</strong>
          <p>6 英寸 / 8 英寸 / 10 英寸</p>
        </section>
        <section class="section">
          <strong>奶油类型</strong>
          <p>轻乳脂 / 海盐 / 桃乌龙</p>
        </section>
      </main>

      <section class="detail-bar">
        <div class="detail-bar__nav">
          <div class="mini-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"></path>
              <path d="M6.5 9.5V20h11V9.5"></path>
            </svg>
            <span>首页</span>
          </div>
          <div class="mini-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="9" cy="20" r="1.5"></circle>
              <circle cx="18" cy="20" r="1.5"></circle>
              <path d="M2.5 4h3l2 11h11l2-7H7"></path>
            </svg>
            <span>购物车</span>
          </div>
        </div>

        <div class="detail-bar__actions">
          <div class="act-btn act-btn--ghost">加入购物车</div>
          <div class="act-btn act-btn--primary">立即购买</div>
        </div>
      </section>

      <div class="home-indicator"></div>
    </section>
  </body>
</html>
